model:
  ctx_len: 16384

train:
  wandb: qwen2rwkv
  
  proj_suffix: rwkv7-corpus-16384-3
  train_stage: 3
  load_partial: 0

  data_type: "binidx" 
  data_file: "/share/data/CorpusQwenTokenizedMini/dataset_chunk_0_text_document" #"data/minipile_qwen2" 
  my_exit_tokens: 100000000 # 371175622
  #my_exit_tokens: 357064122
  magic_prime: 22643 #ctx_len 16384

  lr_wait: 0.8
  lr_decay_type: linear
  lr_init: 1e-5
  lr_final: 1e-5
  warmup_steps: 50 
  beta1: 0.9 
  beta2: 0.95 
  adam_eps: 1e-8 
  weight_decay: 0

  devices: 8
  num_nodes: 1
  micro_bsz: 2 #4
  accumulate_grad_batches: 1 # 96 total bsz
  strategy: fsdp #deepspeed_stage_1
  grad_cp: 1
  ds_bucket_mb: 200 # set to 2 for consumer GPUs, set to 200 for A100 / H100 (affects speed & vram usage)

  epoch_save: 1

#  attention_distillation_stage: 3
  
